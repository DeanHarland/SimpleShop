{% extends 'store/base.html' %}

{% block extra_css %}
<style>
.payment-wrap {
    max-width: 560px;
    margin: 34px auto 0;
    padding: 24px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.92);
    box-shadow: 0 14px 34px rgba(20, 20, 20, 0.08);
}

.payment-wrap h1 {
    margin: 0 0 8px;
    font-size: clamp(1.7rem, 3vw, 2.2rem);
    letter-spacing: -0.02em;
}

.payment-wrap p {
    margin: 0 0 20px;
    color: var(--muted);
}

.payment-form {
    display: grid;
    gap: 14px;
}

.payment-field label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
}

.payment-field input {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 0.85rem;
    font-size: 1rem;
    background: #fff;
}

.payment-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.payment-button {
    margin-top: 6px;
    border: none;
    border-radius: 999px;
    padding: 0.9rem 1.2rem;
    background: var(--text);
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.2s ease, background-color 0.2s ease;
}

.payment-button:hover {
    transform: translateY(-1px);
    background: var(--accent-hover);
}

.payment-note {
    margin-top: 12px;
    font-size: 0.9rem;
    color: var(--muted);
}

@media (max-width: 640px) {
    .payment-wrap {
        margin-top: 20px;
        padding: 18px;
        border-radius: 16px;
    }

    .payment-row {
        grid-template-columns: 1fr;
    }
}
</style>
{% endblock %}

{% block content %}
<section class="payment-wrap">
    <h1>Payment Details</h1>
    <p>Enter your card details below to complete this demo purchase.</p>

    <form class="payment-form" method="post">
        {% csrf_token %}

        <div class="payment-field">
            <label for="card_name">Cardholder Name</label>
            <input id="card_name" type="text" name="card_name" placeholder="John Doe" required>
        </div>

        <div class="payment-field">
            <label for="card_number">Card Number</label>
            <input id="card_number" type="text" name="card_number" placeholder="4242 4242 4242 4242" inputmode="numeric" required>
        </div>

        <div class="payment-row">
            <div class="payment-field">
                <label for="expiry_date">Expiry Date</label>
                <input id="expiry_date" type="text" name="expiry_date" placeholder="MM/YY" required>
            </div>

            <div class="payment-field">
                <label for="cvc">CVC</label>
                <input id="cvc" type="text" name="cvc" placeholder="123" inputmode="numeric" required>
            </div>
        </div>

        <button class="payment-button" type="submit">Pay Now</button>
    </form>

    <p class="payment-note">This is a fake payment form for demo purposes only.</p>
</section>
{% endblock %}
