<!DOCTYPE html>
<html>
<head>
    <title>SimpleShop</title>
    {% block extra_css %}{% endblock %}
    <style>
    :root {
        --page-bg: #f5f2ea;
        --surface: rgba(255, 255, 255, 0.9);
        --surface-strong: #ffffff;
        --border: #e7e0d6;
        --text: #171717;
        --muted: #6e6962;
        --accent: #1f5eff;
        --accent-hover: #1849c7;
    }

    body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--text);
        background:
            radial-gradient(circle at top left, rgba(31, 94, 255, 0.08), transparent 32%),
            linear-gradient(180deg, #faf8f4 0%, var(--page-bg) 100%);
    }

    .site-shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 20px 20px 36px;
    }

    .site-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 14px 18px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--surface);
        backdrop-filter: blur(14px);
        box-shadow: 0 12px 30px rgba(20, 20, 20, 0.06);
    }

    .site-nav__brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: var(--text);
        font-weight: 700;
        letter-spacing: -0.02em;
        white-space: nowrap;
    }

    .site-nav__mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 12px;
        background: var(--text);
        color: #fff;
        font-size: 0.95rem;
    }

    .site-nav__brand-copy {
        display: flex;
        flex-direction: column;
        line-height: 1.1;
    }

    .site-nav__brand-copy span {
        font-size: 0.75rem;
        color: var(--muted);
        font-weight: 500;
    }

    .site-nav__links {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
    }

    .site-nav__links a,
    .site-nav__user {
        display: inline-flex;
        align-items: center;
        padding: 0.7rem 1rem;
        border-radius: 999px;
        color: var(--text);
        text-decoration: none;
        font-weight: 600;
        transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .site-nav__links a:hover {
        background: rgba(31, 94, 255, 0.08);
        color: var(--accent-hover);
        transform: translateY(-1px);
    }

    .site-nav__links a.site-nav__cta {
        background: var(--text);
        color: #fff;
    }

    .site-nav__links a.site-nav__cta:hover {
        background: var(--accent-hover);
        color: #fff;
    }

    .site-nav__user {
        color: var(--muted);
        padding-left: 0.25rem;
        padding-right: 0.25rem;
    }

    .site-nav__menu {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    @media (max-width: 720px) {
        .site-shell {
            padding: 12px 12px 28px;
        }

        .site-nav {
            align-items: flex-start;
            flex-direction: column;
        }

        .site-nav__links {
            width: 100%;
            justify-content: flex-start;
        }
    }
</style>
</head>
<body>
<div class="site-shell">
<nav class="site-nav" aria-label="Primary">
    <a class="site-nav__brand" href="/">
        <span class="site-nav__mark">S</span>
        <span class="site-nav__brand-copy">
            SimpleShop
            <span>Everyday essentials</span>
        </span>
    </a>

    <div class="site-nav__links">
        <div class="site-nav__menu">
            <a href="/">Home</a>
            <a href="{% url 'cart' %}">Cart</a>
        </div>

        {% if user.is_authenticated %}
            <span class="site-nav__user">Welcome, {{ user.username }}</span>
            <a href="{% url 'my_orders' %}">My Orders</a>
            <a class="site-nav__cta" href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a class="site-nav__cta" href="{% url 'login' %}">Login</a>
        {% endif %}
    </div>
</nav>

{% block content %}
{% endblock %}
</div>

</body>
</html>
