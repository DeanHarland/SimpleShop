{% extends 'store/base.html' %}
<h1>Order Confirmed!</h1>

<p>Order ID: {{ order.id }}</p>
<p>Total: £{{ order.total }}</p>

<h2>Items:</h2>

{% for item in items %}
    <div>
        <p>{{ item.product.name }}</p>
        <p>Quantity: {{ item.quantity }}</p>
        <p>Price: £{{ item.price }}</p>
    </div>
{% endfor %}

<a href="/">Continue Shopping</a>
